<!DOCTYPE html>
<html>

<head>

<title>Chirper</title>

<style>

body{
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background:#f5f8fa;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN CARD */

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    width:360px;
}

/* LOGO */

.logo{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#1DA1F2;
    margin-bottom:20px;
}

/* INPUTS */

input{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* BUTTON */

button{
    width:100%;
    padding:10px;
    border:none;
    background:#1DA1F2;
    color:white;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0d8ddb;
}

/* LINKS */

a{
    color:#1DA1F2;
    text-decoration:none;
}

p{
    text-align:center;
    color:#555;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
🐦 Chirper
</div>

{% block content %}
{% endblock %}

</div>

</body>

</html>
