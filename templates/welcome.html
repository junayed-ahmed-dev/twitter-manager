<!DOCTYPE html>
<html>

<head>

<title>Chirper</title>

<style>

body{
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background:#f5f8fa;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN CARD */

.container{
    background:white;
    padding:50px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
    text-align:center;
}

/* LOGO */

.logo{
    font-size:40px;
    color:#1DA1F2;
    margin-bottom:10px;
}

/* TITLE */

h1{
    font-size:36px;
    margin-bottom:10px;
}

/* TEXT */

p{
    color:#555;
    margin-bottom:30px;
}

/* BUTTONS */

.button{
    padding:12px 22px;
    background:#1DA1F2;
    color:white;
    text-decoration:none;
    border-radius:25px;
    margin:10px;
    font-weight:bold;
    display:inline-block;
}

.button:hover{
    background:#0d8ddb;
}

.secondary{
    background:#e8f5fe;
    color:#1DA1F2;
}

.secondary:hover{
    background:#d7efff;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🐦 Chirper</div>

<h1>Welcome to Chirper</h1>

<p>Share thoughts. Follow people. Discover tweets.</p>

<a class="button" href="/accounts/login/">Login</a>

<a class="button secondary" href="/users/signup/">Sign Up</a>

</div>

</body>
</html>
